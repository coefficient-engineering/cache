# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  build:
    desc: Compile all packages
    cmds:
      - go build ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./... -count=1

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test ./... -v -count=1

  test:race:
    desc: Run all tests with race detector
    cmds:
      - go test ./... -race -count=1

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -func=coverage.out

  test:cover:html:
    desc: Generate and open HTML coverage report
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html
      - open coverage.html

  test:all:
    desc: Run tests for all modules in workspace
    cmds:
      - |
        for mod in $(go work edit -json | jq -r '.Use[].DiskPath'); do 
          echo "Running tests for $mod"
          go test {{.CLI_ARGS}} "$mod"/... -count=1
        done

  test:all:race:
    desc: Run tests for all modules in workspace
    cmds:
      - |
        for mod in $(go work edit -json | jq -r '.Use[].DiskPath'); do 
          echo "Running tests for $mod"
          go test {{.CLI_ARGS}} "$mod"/... -race -count=1
        done

  lint:
    desc: Run static analysis
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format all Go files
    cmds:
      - golangci-lint fmt

  check:
    desc: Run all checks (format, lint, build, test)
    cmds:
      - task: fmt
      - task: lint
      - task: build
      - task: test:race

  clean:
    desc: Remove generated files
    cmds:
      - rm -f coverage.out coverage.html
